<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 背景 -->
  <rect width="100" height="100" rx="20" fill="#2196F3"/>

  <!-- 书本主体 -->
  <rect x="20" y="15" width="60" height="70" rx="4" fill="white"/>

  <!-- 书本封面 -->
  <rect x="20" y="15" width="60" height="15" rx="4" fill="#1976D2"/>

  <!-- 书脊 -->
  <rect x="20" y="15" width="8" height="70" rx="2" fill="#1565C0"/>

  <!-- 书页线条 -->
  <line x1="32" y1="35" x2="72" y2="35" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="32" y1="45" x2="72" y2="45" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="32" y1="55" x2="72" y2="55" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="32" y1="65" x2="72" y2="65" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="32" y1="75" x2="72" y2="75" stroke="#E0E0E0" stroke-width="2"/>

  <!-- 书签 -->
  <polygon points="55,15 55,35 60,30 65,35 65,15" fill="#FF5252"/>
</svg>
