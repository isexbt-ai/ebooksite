version: "3.8"

services:
  ebooksite:
    build: .
    container_name: ebooksite
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - PORT=8080
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here-change-this}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
